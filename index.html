<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ClipSafe — Decentralized AI Media Platform | 100% Private Video Editing</title>
    <meta name="description" content="Edit, compress, convert, and automate video production entirely in your browser. ClipSafe is a zero-upload, privacy-first media platform powered by AI and WebAssembly. No accounts, no data leaves your device." />
    <meta name="keywords" content="video editor, browser video editor, private video editing, local ai, ffmpeg.wasm, webassembly, privacy, clipsafe, media tool, open source video editor" />
    <meta name="author" content="ClipSafe" />
    <meta name="version" content="0.0.1 Beta" />
    <meta name="robots" content="index, follow" />
    <meta name="theme-color" content="#1a1a1a" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://clipsafe.app/" />
    <meta property="og:title" content="ClipSafe — Decentralized AI Media Platform" />
    <meta property="og:description" content="Desktop-grade video tools in your browser. 100% Private. Zero Uploads." />
    <meta property="og:image" content="/logo.png" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://clipsafe.app/" />
    <meta property="twitter:title" content="ClipSafe — Decentralized AI Media Platform" />
    <meta property="twitter:description" content="Edit video privately with AI-powered local tools. No servers, no tracking." />
    <meta property="twitter:image" content="/logo.png" />

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/logo.png" />
    <link rel="apple-touch-icon" href="/logo.png" />

    <!-- Structured Data (JSON-LD) -->

      "name": "ClipSafe",

      "offers": {

        "priceCurrency": "USD"
      },
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "5",
        "reviewCount": "200"
      },
      "author": {
        "@type": "Organization",
        "name": "BetelBuddy"
      },
      "description": "Privacy-first, AI-powered media platform running entirely in the browser using WebAssembly and FFmpeg.",
      "softwareVersion": "0.0.1 Beta"
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
